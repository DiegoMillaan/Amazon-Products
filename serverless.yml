service: taller-products
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'local'}
  region: us-east-1
  profile: serverless-user-personal
  environment:
    STAGE: ${self:provider.stage}
    PRODUCTS_TABLE: ${self:service}-${self:provider.stage}-products-table
    JWT_SECRET: ${ssm:/taller-gateway/${self:provider.stage}/JWT_SECRET}
  apiGateway:
    restApiId:
      'Fn::ImportValue': MainRestApiId-${self:provider.stage}
    restApiRootResourceId:
      'Fn::ImportValue': MainRestApiRootResourceId-${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
            - dynamodb:DescribeTable
          Resource: 
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PRODUCTS_TABLE}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PRODUCTS_TABLE}/index/*"

functions:
  createProduct:
    handler: src/handlers/createProduct.createProduct
    events:
      - http:
          path: /products
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId:
              'Fn::ImportValue': MainAuthorizerId-${self:provider.stage}

  getProduct:
    handler: src/handlers/getProduct.getProduct
    events:
      - http:
          path: /products/{id}
          method: get
          cors: true

  updateProduct:
    handler: src/handlers/updateProduct.updateProduct
    events:
      - http:
          path: /products/{id}
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId:
              'Fn::ImportValue': MainAuthorizerId-${self:provider.stage}

  deleteProduct:
    handler: src/handlers/deleteProduct.deleteProduct
    events:
      - http:
          path: /products/{id}
          method: delete
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId:
              'Fn::ImportValue': MainAuthorizerId-${self:provider.stage}

  listAllProducts:
    handler: src/handlers/listAllProducts.listAllProducts
    events:
      - http:
          path: /products
          method: get
          cors: true

  listProductsBySeller:
    handler: src/handlers/listProductsBySeller.listProductsBySeller
    events:
      - http:
          path: /products/seller/{sellerId}
          method: get
          cors: true

  updateStock:
    handler: src/handlers/updateStock.updateStock
    events:
      - http:
          path: /products/{id}/stock
          method: patch
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId:
              'Fn::ImportValue': MainAuthorizerId-${self:provider.stage}

resources:
  Resources:
    ProductsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PRODUCTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: productId
            AttributeType: S
          - AttributeName: sellerId
            AttributeType: S
        KeySchema:
          - AttributeName: productId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: sellerIndex
            KeySchema:
              - AttributeName: sellerId
                KeyType: HASH
            Projection:
              ProjectionType: ALL